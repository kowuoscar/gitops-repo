apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd
  labels:
    app.kubernetes.ioname: podinfo
spec:
  project: default
  source:
    repoURL: https://github.com/
    targetRevision: HEAD
    path: manifests/podinfo
  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo
  syncPolicy:
    syncOptions:
    - CreateNamespace=true