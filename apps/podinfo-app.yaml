apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd
  labels:
    app.kubernetes.io/name: podinfo
spec:
  project: team-backend
  source:
    repoURL: https://github.com/kowuoscar/gitops-repo
    targetRevision: HEAD
    path: manifests/podinfo
  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true